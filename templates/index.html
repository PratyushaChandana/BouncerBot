<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bouncer Bot</title>

    <style>
        body {
            background: #0b0f19;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: white;
        }

        #chat-toggle {
            position: fixed;
            bottom: 22px;
            right: 22px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #22c55e;
            border: none;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            z-index: 9999;
        }

        #chat-toggle img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        #chat-box {
            position: fixed;
            bottom: 110px;
            right: 22px;
            width: 380px;
            height: 480px;
            background: #111827;
            border-radius: 14px;
            box-shadow: 0 0 25px rgba(0,0,0,0.6);
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 9999;
        }

        .header {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #0f172a;
            border-bottom: 1px solid #1f2937;
        }

        .header img {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 2px solid #22c55e;
            margin-right: 12px;
        }

        .messages {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
        }

        .msg {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 10px;
            max-width: 80%;
            line-height: 1.3;
        }

        .bot {
            background: #1f2937;
            border-left: 3px solid #22c55e;
        }

        .user {
            background: #22c55e;
            color: #022c22;
            margin-left: auto;
            border-right: 3px solid #065f46;
        }

        .input-area {
            display: flex;
            padding: 10px;
            background: #0f172a;
            border-top: 1px solid #1f2937;
        }

        .input-area input {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: none;
            outline: none;
            background: #020617;
            color: white;
        }

        .input-area button {
            margin-left: 8px;
            padding: 10px 16px;
            background: #22c55e;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>

<body>

<!-- Floating Button -->
<button id="chat-toggle">
    <img src="https://icon2.cleanpng.com/20180406/trw/avbrb9fbu.webp">
</button>

<!-- Chat Window -->
<div id="chat-box">
    <div class="header">
        <img src="https://icon2.cleanpng.com/20180406/trw/avbrb9fbu.webp">
        <div>
            <strong>Bouncer Bot</strong><br>
            <small>“Your AI Bouncer on Duty.”</small>
        </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
        <input id="input" placeholder="Type your message...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    // ---------------------------------------------
    // 1. Create persistent session ID in localStorage
    // ---------------------------------------------
    if (!localStorage.getItem("bouncer_session")) {
        localStorage.setItem("bouncer_session", crypto.randomUUID());
    }
    const sessionId = localStorage.getItem("bouncer_session");

    // ---------------------------------------------
    // 2. Chat widget behavior
    // ---------------------------------------------
    const chatToggle = document.getElementById("chat-toggle");
    const chatBox = document.getElementById("chat-box");
    const messagesDiv = document.getElementById("messages");
    const inputField = document.getElementById("input");

    // Fix double-click issue
    chatBox.style.display = "none";

    chatToggle.onclick = () => {
        chatBox.style.display = chatBox.style.display === "none" ? "flex" : "none";
    };

    function addMessage(text, sender) {
        const div = document.createElement("div");
        div.className = "msg " + sender;
        div.textContent = text;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // ---------------------------------------------
    // 3. Send message with session_id included
    // ---------------------------------------------
    async function sendMessage() {
        const text = inputField.value.trim();
        if (!text) return;

        addMessage(text, "user");
        inputField.value = "";

        const response = await fetch("/message", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                message: text,
                session_id: sessionId
            })
        });

        const data = await response.json();
        addMessage(data.reply, "bot");
    }

    // Allow Enter key to send
    inputField.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
            sendMessage();
        }
    });

    // ---------------------------------------------
    // 4. Trigger intro handshake
    // ---------------------------------------------
    fetch("/message", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            message: "__init__",
            session_id: sessionId
        })
    }).then(res => res.json())
      .then(data => addMessage("🛡️ Bouncer Bot online. How can I help?", "bot"));
</script>

</body>
</html>
